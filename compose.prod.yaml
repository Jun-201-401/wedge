name: wedge

services:
  nginx:
    image: nginx:1.30.0
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/wedge.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/jenkins.prod.conf:/etc/nginx/conf.d/jenkins.conf:ro
      - ./infra/nginx/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - default
      - jenkins

  web:
    image: ${WEB_IMAGE:-wedge-web:deploy-local}
    restart: unless-stopped

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    image: ${API_SERVER_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WEDGE_RUNNER_MQ_EXCHANGE: ${WEDGE_RUNNER_MQ_EXCHANGE}
      WEDGE_RUN_EXECUTE_QUEUE: ${WEDGE_RUN_EXECUTE_QUEUE}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      WEDGE_ARTIFACT_STORAGE: ${WEDGE_ARTIFACT_STORAGE}
      WEDGE_ARTIFACT_BUCKET: ${WEDGE_ARTIFACT_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET}

  runner:
    image: ${RUNNER_IMAGE:-wedge-runner:deploy-local}
    restart: unless-stopped
    init: true
    depends_on:
      api-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      RUNNER_SERVICE_NAME: runner
      RUNNER_MQ_CONSUMER_ENABLED: "true"
      RUNNER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      RUNNER_MQ_QUEUE_RUN_EXECUTE: ${WEDGE_RUN_EXECUTE_QUEUE}
      RUNNER_MQ_PREFETCH: 1
      RUNNER_MQ_REQUEUE_ON_FAILURE: "false"
      RUNNER_BROWSER_MODE: playwright
      RUNNER_BROWSER_HEADLESS: "true"
      RUNNER_CALLBACK_MODE: http
      RUNNER_CALLBACK_BASE_URL: http://api-server:8080
      RUNNER_CALLBACK_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RUNNER_CALLBACK_SIGNATURE_SECRET: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET}
      RUNNER_ARTIFACTS_ROOT: /app/apps/runner/.runner-artifacts
      RUNNER_ARTIFACT_STORAGE: ${RUNNER_ARTIFACT_STORAGE}
      RUNNER_ARTIFACT_BUCKET: ${RUNNER_ARTIFACT_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    shm_size: 1gb
    volumes:
      - runner_data:/app/apps/runner/.runner-artifacts

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  runner_data:

networks:
  default:
  jenkins:
    external: true
    name: wedge-jenkins_jenkins
