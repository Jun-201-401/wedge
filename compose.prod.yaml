name: wedge

services:
  nginx:
    image: nginx:1.30.0
    restart: unless-stopped
    depends_on:
      api-server:
        condition: service_started
      web:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/wedge.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/jenkins.prod.conf:/etc/nginx/conf.d/jenkins.conf:ro
      - ./infra/nginx/certbot/www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - default
      - jenkins

  web:
    image: ${WEB_IMAGE:-wedge-web:deploy-local}
    restart: unless-stopped

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq-prod.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/rabbitmq-definitions-prod.json:/etc/rabbitmq/rabbitmq-definitions-prod.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    image: ${API_SERVER_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WEDGE_RUNNER_MQ_EXCHANGE: ${WEDGE_RUNNER_MQ_EXCHANGE}
      WEDGE_RUN_EXECUTE_QUEUE: ${WEDGE_RUN_EXECUTE_QUEUE}
      WEDGE_DISCOVERY_EXECUTE_QUEUE: ${WEDGE_DISCOVERY_EXECUTE_QUEUE:-discovery.execute.request}
      WEDGE_ANALYZER_MQ_ANALYSIS_REQUEST_QUEUE: ${WEDGE_ANALYSIS_REQUEST_QUEUE:-analysis.request}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      WEDGE_ARTIFACT_STORAGE: ${WEDGE_ARTIFACT_STORAGE}
      WEDGE_ARTIFACT_BUCKET: ${WEDGE_ARTIFACT_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET}

  runner:
    image: ${RUNNER_IMAGE:-wedge-runner:deploy-local}
    restart: unless-stopped
    init: true
    depends_on:
      api-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      RUNNER_SERVICE_NAME: runner
      RUNNER_MQ_CONSUMER_ENABLED: "true"
      RUNNER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      RUNNER_MQ_QUEUE_RUN_EXECUTE: ${WEDGE_RUN_EXECUTE_QUEUE}
      RUNNER_MQ_QUEUE_AGENT_EXECUTE: ${WEDGE_AGENT_EXECUTE_QUEUE:-agent.execute.request}
      RUNNER_MQ_QUEUE_DISCOVERY_EXECUTE: ${WEDGE_DISCOVERY_EXECUTE_QUEUE:-discovery.execute.request}
      RUNNER_MQ_PREFETCH: 1
      RUNNER_MQ_REQUEUE_ON_FAILURE: "false"
      RUNNER_BROWSER_MODE: playwright
      RUNNER_BROWSER_HEADLESS: "true"
      RUNNER_CALLBACK_MODE: http
      RUNNER_CALLBACK_BASE_URL: http://api-server:8080
      RUNNER_CALLBACK_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RUNNER_CALLBACK_SIGNATURE_SECRET: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET}
      RUNNER_ARTIFACTS_ROOT: /app/apps/runner/.runner-artifacts
      RUNNER_ARTIFACT_STORAGE: ${RUNNER_ARTIFACT_STORAGE}
      RUNNER_ARTIFACT_BUCKET: ${RUNNER_ARTIFACT_BUCKET}
      RUNNER_AGENT_DECISION_MODE: ${RUNNER_AGENT_DECISION_MODE:-heuristic}
      RUNNER_AGENT_LLM_ENDPOINT: ${RUNNER_AGENT_LLM_ENDPOINT:-}
      RUNNER_AGENT_LLM_API_KEY: ${RUNNER_AGENT_LLM_API_KEY:-}
      RUNNER_AGENT_LLM_MODEL: ${RUNNER_AGENT_LLM_MODEL:-agent-decision}
      RUNNER_AGENT_LLM_TIMEOUT_MS: ${RUNNER_AGENT_LLM_TIMEOUT_MS:-10000}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    shm_size: 1gb
    volumes:
      - runner_data:/app/apps/runner/.runner-artifacts

  analyzer-worker:
    image: ${ANALYZER_IMAGE:-wedge-analyzer:deploy-local}
    restart: unless-stopped
    init: true
    depends_on:
      api-server:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    command: ["python", "scripts/consume_analysis_requests.py"]
    environment:
      ANALYZER_WORKER_ID: analyzer-worker-prod
      ANALYZER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      ANALYZER_MQ_QUEUE_ANALYSIS_REQUEST: ${WEDGE_ANALYSIS_REQUEST_QUEUE:-analysis.request}
      ANALYZER_MQ_PREFETCH: ${ANALYZER_MQ_PREFETCH:-1}
      ANALYZER_MQ_REQUEUE_ON_FAILURE: "false"
      ANALYZER_MQ_QUEUE_DEAD_LETTER_EXCHANGE: wedge.dlq
      ANALYZER_MQ_QUEUE_DEAD_LETTER_ROUTING_KEY: analysis.dlq
      ANALYZER_MQ_QUEUE_TYPE: ""
      ANALYZER_CALLBACK_BASE_URL: http://api-server:8080
      ANALYZER_CALLBACK_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ANALYZER_CALLBACK_SIGNATURE_SECRET: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET}
      ANALYZER_EVIDENCE_BASE_URL: http://api-server:8080
      ANALYZER_EVIDENCE_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ANALYZER_GMS_ENABLED: ${ANALYZER_GMS_ENABLED:-false}
      ANALYZER_GMS_API_KEY: ${ANALYZER_GMS_API_KEY:-}
      ANALYZER_GMS_MODEL: ${ANALYZER_GMS_MODEL:-gpt-4.1-nano}
      ANALYZER_GMS_BASE_URL: ${ANALYZER_GMS_BASE_URL:-https://gms.ssafy.io/gmsapi}
      ANALYZER_GMS_OPENAI_RESPONSES_PATH: ${ANALYZER_GMS_OPENAI_RESPONSES_PATH:-api.openai.com/v1/responses}
      ANALYZER_GMS_TIMEOUT_SECONDS: ${ANALYZER_GMS_TIMEOUT_SECONDS:-20}

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  runner_data:

networks:
  default:
  jenkins:
    external: true
    name: wedge-jenkins_jenkins
