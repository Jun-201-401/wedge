openapi: 3.0.3
info:
  title: Wedge API
  version: 1.0.0-draft
  description: Wedge public REST API (/api), internal callback API (/internal), and canonical transport schemas. This draft
    includes report shares, checkpoint callback, and evidence packet retrieval.
servers:
- url: http://localhost:8080
  description: local API server for Swagger MVP testing
- url: https://api.wedge.example.com
  description: production placeholder
- url: https://staging-api.wedge.example.com
  description: staging placeholder
security:
- HumanBearer: []
tags:
- name: Auth
  description: 회원가입, 로그인, 토큰 재발급, 현재 사용자 확인 API입니다. Swagger에서는 signup/login 후 accessToken을 Authorize에 넣어 후속 API를 테스트합니다.
- name: Projects
  description: 분석 대상 프로젝트를 관리하는 계약 API입니다. MVP 실행 테스트에서는 seed projectId 확인 용도로 사용합니다.
- name: ScenarioTemplates
  description: Run 생성에 필요한 시나리오 템플릿과 버전 정보를 조회하는 계약 API입니다.
- name: Discoveries
  description: URL 사전 탐색과 추천 시나리오 확인을 위한 계약 API입니다.
- name: Runs
  description: 실행 생성, 조회, 시작, 중지, live 상태 확인을 담당하는 MVP 핵심 API입니다.
- name: Steps
  description: 실행 단계 단위 상태를 확인하는 API입니다. 현재 MVP에서는 일부 구현이 제한적일 수 있습니다.
- name: Events
  description: Runner 이벤트 타임라인을 확인하는 API입니다.
- name: Artifacts
  description: 실행 중 수집된 스크린샷, HTML, trace 등 아티팩트를 조회/다운로드하는 API입니다.
- name: Signals
  description: 분석 결과에서 사용자에게 보여줄 이슈 시그널을 조회하는 API입니다.
- name: Analysis
  description: EvidencePacket 기반 분석 요청과 분석 작업 상태를 다루는 API입니다.
- name: Reports
  description: 분석 결과 리포트 생성, 조회, 공유를 담당하는 API입니다.
- name: InternalRunner
  description: Runner 서비스가 API 서버로 실행 상태와 evidence를 전달하는 내부 callback API입니다.
- name: InternalAnalyzer
  description: Analyzer 서비스가 분석 결과를 API 서버로 전달하거나 EvidencePacket을 조회하는 내부 API입니다.
paths:
  /api/auth/signup:
    post:
      tags:
      - Auth
      operationId: signup
      summary: 회원가입
      description: 새 테스트 사용자를 생성하고 accessToken과 refresh cookie 발급을 확인한다. Swagger에서는 예시 값을 그대로 실행한 뒤 응답의 data.accessToken을
        Authorize에 넣어 후속 인증 API를 테스트한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              mvpSignup:
                summary: MVP 테스트 사용자 회원가입
                value:
                  email: mvp.tester@example.com
                  password: wedge-test-1234
                  displayName: MVP 테스터
      responses:
        '201':
          description: Signed up
          headers:
            Set-Cookie:
              description: 'HttpOnly refresh token cookie (`wedge_refresh_token`); attributes: `Path=/api/auth`, `HttpOnly`,
                `SameSite=Lax`, `Max-Age` set to refresh TTL, and `Secure` in production/HTTPS contexts.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/login:
    post:
      tags:
      - Auth
      operationId: login
      summary: 로그인
      description: 기존 사용자 이메일/비밀번호로 accessToken 발급을 확인한다. 회원가입 후 같은 계정으로 호출하고, 응답 토큰으로 인증이 필요한 API를 이어서 테스트한다.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              mvpLogin:
                summary: MVP 테스트 사용자 로그인
                value:
                  email: mvp.tester@example.com
                  password: wedge-test-1234
      responses:
        '200':
          description: Logged in
          headers:
            Set-Cookie:
              description: 'HttpOnly refresh token cookie (`wedge_refresh_token`); attributes: `Path=/api/auth`, `HttpOnly`,
                `SameSite=Lax`, `Max-Age` set to refresh TTL, and `Secure` in production/HTTPS contexts.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/refresh:
    post:
      tags:
      - Auth
      operationId: refreshHumanToken
      summary: 액세스 토큰 재발급
      description: 브라우저에 저장된 wedge_refresh_token HttpOnly cookie로 새 accessToken을 발급받는지 확인한다. Swagger 단독보다는 같은 브라우저에서 signup/login
        후 cookie가 유지된 상태로 테스트한다.
      security: []
      parameters:
      - name: wedge_refresh_token
        in: cookie
        required: true
        description: HttpOnly refresh token cookie issued by signup/login/refresh.
        schema:
          type: string
      responses:
        '200':
          description: Token refreshed
          headers:
            Set-Cookie:
              description: 'Rotated HttpOnly refresh token cookie (`wedge_refresh_token`); attributes: `Path=/api/auth`, `HttpOnly`,
                `SameSite=Lax`, `Max-Age` set to refresh TTL, and `Secure` in production/HTTPS contexts.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '401':
          description: Refresh cookie missing, invalid, or expired. Also expires the browser refresh cookie.
          headers:
            Set-Cookie:
              description: 'Expired HttpOnly refresh token cookie (`wedge_refresh_token`); attributes: `Path=/api/auth`, `HttpOnly`,
                `SameSite=Lax`, `Max-Age=0`, and `Secure` in production/HTTPS contexts.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/logout:
    post:
      tags:
      - Auth
      operationId: logout
      summary: 로그아웃
      description: 현재 사용자 세션을 종료하고 refresh cookie 만료 헤더가 내려오는지 확인한다. Bearer 토큰 인증 후 호출한다.
      security:
      - HumanBearer: []
      responses:
        '200':
          description: Logged out
          headers:
            Set-Cookie:
              description: 'Expired HttpOnly refresh token cookie (`wedge_refresh_token`); attributes: `Path=/api/auth`, `HttpOnly`,
                `SameSite=Lax`, `Max-Age=0`, and `Secure` in production/HTTPS contexts.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/me:
    get:
      tags:
      - Auth
      operationId: getCurrentUser
      summary: 내 사용자 정보 조회
      description: Authorize에 넣은 Bearer 토큰이 유효한지 확인하고 현재 사용자 id, email, displayName, status를 조회한다.
      security:
      - HumanBearer: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/projects:
    get:
      tags:
      - Projects
      operationId: listProjects
      summary: 프로젝트 목록 조회
      description: 사용자가 접근 가능한 프로젝트 목록과 paging meta를 확인한다. 현재 MVP 런타임에서는 구현 여부를 먼저 확인해야 하는 계약 API다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: workspaceId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Projects
      operationId: createProject
      summary: 프로젝트 생성
      description: 분석 대상 사이트를 묶는 프로젝트를 생성하는 계약 API다. 현재 MVP 런타임에서는 구현 여부를 먼저 확인해야 한다.
      security:
      - HumanBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/projects/{projectId}:
    get:
      tags:
      - Projects
      operationId: getProject
      summary: 프로젝트 상세 조회
      description: projectId로 프로젝트 상세 정보를 조회하는 계약 API다. Run 생성에 필요한 projectId 확인 용도로 사용한다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - Projects
      operationId: patchProject
      summary: 프로젝트 수정
      description: 프로젝트 이름/설정 같은 일부 필드를 수정하는 계약 API다. MVP 테스트에서는 핵심 실행 플로우 전 필수 단계는 아니다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatchRequest'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates:
    get:
      tags:
      - ScenarioTemplates
      operationId: listScenarioTemplates
      summary: 시나리오 템플릿 목록 조회
      description: Run 생성에 사용할 scenarioTemplateVersionId 후보를 확인하는 계약 API다. 현재는 seed/DB 값으로 대체해 테스트할 수 있다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: status
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Scenario template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListScenarioTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplate
      summary: 시나리오 템플릿 상세 조회
      description: templateId 기준으로 템플릿 메타데이터와 버전 정보를 확인한다. Run 생성 예시 값 검증에 사용한다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Scenario template
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplate'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}/versions/{versionId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplateVersion
      summary: 시나리오 템플릿 버전 조회
      description: 특정 템플릿 버전의 payload 구조를 확인한다. Run 생성 시 scenarioTemplateVersionId와 scenarioPlan을 맞출 때 사용한다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Scenario template version
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplateVersion'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/discoveries:
    post:
      tags:
      - Discoveries
      operationId: createDiscovery
      summary: 사이트 사전 탐색 시작
      description: 전체 실행 전에 URL을 가볍게 탐색해 추천 시나리오를 만들기 위한 계약 API다. MVP 핵심 수동 테스트에서는 Run 생성 예시로 대체 가능하다.
      security:
      - HumanBearer: []
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscoveryRequest'
            example:
              url: https://example.com
              devicePreset: desktop
              viewport:
                width: 1440
                height: 900
      responses:
        '202':
          description: Discovery queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleDiscoveryResponse'
              example:
                data:
                  discoveryId: disc_123
                  status: QUEUED
                meta:
                  requestId: req_123
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/discoveries/{discoveryId}:
    get:
      tags:
      - Discoveries
      operationId: getDiscovery
      summary: 사이트 사전 탐색 결과 조회
      description: discoveryId로 사전 탐색 결과와 추천 시나리오를 확인한다. Discovery 기반 Run 생성 전 확인용이다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/DiscoveryId'
      responses:
        '200':
          description: Discovery result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleDiscoveryResponse'
              example:
                data:
                  discoveryId: disc_123
                  status: COMPLETED
                  inputUrl: https://example.com
                  finalUrl: https://example.com
                  summary:
                    detectedFlowTypes:
                    - LANDING_CTA
                    - SIGNUP_LEAD_FORM
                    missingFlowTypes:
                    - PURCHASE_CHECKOUT
                    primaryCtaCount: 2
                    formCandidateCount: 1
                    pricingEntrypointCount: 0
                    checkoutEntrypointCount: 0
                  scenarioRecommendations:
                  - scenarioType: LANDING_CTA
                    recommendationLevel: HIGH
                    confidence: 0.86
                    reason: First-view primary CTA supports a landing CTA scenario.
                    evidenceRefs:
                    - cp_001.obs_002
                    suggestedStartUrl: https://example.com
                  - scenarioType: PURCHASE_CHECKOUT
                    recommendationLevel: LOW
                    confidence: 0.22
                    reason: No pricing, cart, or checkout entrypoint was detected.
                    evidenceRefs:
                    - cp_001.obs_008
                meta:
                  requestId: req_124
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs:
    get:
      tags:
      - Runs
      operationId: listRuns
      summary: 실행 목록 조회
      description: 생성된 Run 목록과 상태 필터링을 확인한다. signup/login 후 Bearer 토큰으로 호출해 생성된 Run이 목록에 보이는지 테스트한다.
      security:
      - HumanBearer: []
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: projectId
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
      - name: analysisStatus
        in: query
        schema:
          type: string
      - name: createdFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: createdTo
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Runs
      operationId: createRun
      summary: 실행 생성
      description: 분석 실행 단위를 생성한다. Swagger 예시는 회원가입 CTA 점검용 scenarioPlan을 포함하며, projectId와 scenarioTemplateVersionId는 로컬 DB/seed
        값으로 교체해야 실제 테스트가 가능하다.
      security:
      - HumanBearer: []
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
            examples:
              signupBasicMvp:
                summary: Runner smoke 실행 생성
                description: infra/scripts/seed-real-run-smoke.mjs가 생성하는 projectId/scenarioTemplateVersionId를 사용하는 최소 Runner
                  연동 테스트 예시다. target URL을 바꾸면 startUrl과 scenarioPlan.start_url을 같은 값으로 맞춘다.
                value:
                  projectId: 8f06dca8-9c4d-4f20-b1a8-1d5ee40a9923
                  name: Runner smoke 실행
                  startUrl: https://example.com/
                  goal: Runner가 URL을 열고 checkpoint/artifact/evidence callback을 API 서버로 보내는지 확인한다.
                  devicePreset: desktop
                  scenarioTemplateVersionId: 5c5f4c77-0c32-4ab3-9841-2b6f6cc07a40
                  scenarioOverrides:
                    source: swagger-runner-smoke
                  scenarioPlan:
                    schema_version: '0.5'
                    plan_id: smoke_landing_cta_hero_only
                    scenario_type: custom_compiled
                    template_key: landing-cta
                    goal: 'Runner smoke: URL open, checkpoint, evidence callback, API evidence packet.'
                    start_url: https://example.com/
                    environment:
                      device: desktop
                      viewport:
                        width: 1440
                        height: 900
                      locale: ko-KR
                      timezone: Asia/Seoul
                      permissions: []
                      auth_state: anonymous
