components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.wedge.example.com/oauth2/authorize
          tokenUrl: https://auth.wedge.example.com/oauth2/token
          scopes:
            wedge.read: Read Wedge resources
            wedge.execute: Create and execute runs
            wedge.export: Export reports
            wedge.admin: Administrative actions
        clientCredentials:
          tokenUrl: https://auth.wedge.example.com/oauth2/token
          scopes:
            wedge.read: Read Wedge resources
            wedge.execute: Create and execute runs
            wedge.export: Export reports
            wedge.admin: Administrative actions
    InternalBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AnalysisJobId:
      name: analysisJobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  headers:
    XCorrelationId:
      schema:
        type: string
    IdempotencyKey:
      schema:
        type: string
    XWorkerId:
      schema:
        type: string
    XEventId:
      schema:
        type: string
    XSignature:
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AcceptedAck:
      description: Accepted for asynchronous processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        nextCursor:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required:
          - code
          - message
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - error
      - meta
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: project
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        baseUrl:
          type: string
          format: uri
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - type
      - workspaceId
      - name
      - baseUrl
      - status
      - createdAt
    ProjectCreateRequest:
      type: object
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        baseUrl:
          type: string
          format: uri
      required:
      - workspaceId
      - name
      - baseUrl
    ProjectPatchRequest:
      type: object
      properties:
        name:
          type: string
        baseUrl:
          type: string
          format: uri
        status:
          type: string
    ScenarioTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateKey:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
      required:
      - id
      - templateKey
      - name
      - status
    ScenarioTemplateVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        versionNo:
          type: integer
        definition:
          type: object
          additionalProperties: true
      required:
      - id
      - templateId
      - versionNo
      - definition
    Run:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: run
        projectId:
          type: string
          format: uuid
        name:
          type: string
        triggerSource:
          type: string
        startUrl:
          type: string
          format: uri
        goal:
          type: string
          nullable: true
        devicePreset:
          type: string
        status:
          type: string
          enum:
          - CREATED
          - QUEUED
          - STARTING
          - RUNNING
          - STOP_REQUESTED
          - STOPPED
          - ANALYZING
          - COMPLETED
          - FAILED
        resultCompleteness:
          type: string
          enum:
          - NONE
          - PARTIAL
          - FINAL
        analysisStatus:
          type: string
          enum:
          - NOT_STARTED
          - QUEUED
          - RUNNING
          - COMPLETED
          - FAILED
        currentStepOrder:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        failureCode:
          type: string
          nullable: true
        failureMessage:
          type: string
          nullable: true
        latestSnapshot:
          $ref: '#/components/schemas/LatestSnapshot'
      required:
      - id
      - type
      - projectId
      - name
      - startUrl
      - devicePreset
      - status
      - resultCompleteness
      - analysisStatus
    LatestSnapshot:
      type: object
      properties:
        artifactId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        capturedAt:
          type: string
          format: date-time
    RunCreateRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        name:
          type: string
        startUrl:
          type: string
          format: uri
        goal:
          type: string
          nullable: true
        devicePreset:
          type: string
        scenarioTemplateVersionId:
          type: string
          format: uuid
          nullable: true
        scenarioOverrides:
          type: object
          additionalProperties: true
      required:
      - projectId
      - name
      - startUrl
      - devicePreset
    RunActionRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
    AckResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - data
      - meta
    Step:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepOrder:
          type: integer
        stepKey:
          type: string
        stepName:
          type: string
        stepType:
          type: string
        status:
          type: string
          enum:
          - PENDING
          - RUNNING
          - PASSED
          - FAILED
          - SKIPPED
          - BLOCKED
          - STOPPED
        target:
          type: object
          additionalProperties: true
        input:
          type: object
          additionalProperties: true
          nullable: true
        output:
          type: object
          additionalProperties: true
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
      required:
      - id
      - runId
      - stepOrder
      - stepKey
      - stepName
      - stepType
      - status
    RunEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepId:
          type: string
          format: uuid
          nullable: true
        eventType:
          type: string
        eventSource:
          type: string
        payload:
          type: object
          additionalProperties: true
        occurredAt:
          type: string
          format: date-time
      required:
      - id
      - runId
      - eventType
      - eventSource
      - payload
      - occurredAt
    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepId:
          type: string
          format: uuid
          nullable: true
        artifactType:
          type: string
        bucket:
          type: string
        key:
          type: string
        mimeType:
          type: string
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        sizeBytes:
          type: integer
        sha256:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - runId
      - artifactType
      - bucket
      - key
      - mimeType
      - sizeBytes
      - createdAt
    IssueSignal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        stepId:
          type: string
          format: uuid
          nullable: true
        category:
          type: string
        source:
          type: string
        score:
          type: number
          nullable: true
        confidence:
          type: number
          nullable: true
        reason:
          type: string
          nullable: true
        evidenceRefs:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
      - id
      - runId
      - category
      - source
    AnalysisFinding:
      type: object
      properties:
        rank:
          type: integer
        category:
          type: string
        title:
          type: string
        description:
          type: string
        confidence:
          type: number
          nullable: true
        impact:
          type: string
          nullable: true
        evidenceRefs:
          type: array
          items:
            type: object
            additionalProperties: true
      required:
      - rank
      - category
      - title
      - description
    Nudge:
      type: object
      properties:
        title:
          type: string
        rationale:
          type: string
        difficulty:
          type: string
          nullable: true
        expectedEffect:
          type: string
          nullable: true
        priority:
          type: string
          nullable: true
        followUpQuestion:
          type: string
          nullable: true
      required:
      - title
      - rationale
    AnalysisJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        analysisType:
          type: string
        status:
          type: string
        analyzerVersion:
          type: string
          nullable: true
        promptVersion:
          type: string
          nullable: true
        modelInfo:
          type: object
          additionalProperties: true
        topFindings:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisFinding'
        nudges:
          type: array
          items:
            $ref: '#/components/schemas/Nudge'
        createdAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
      required:
      - id
      - runId
      - analysisType
      - status
      - createdAt
    AnalysisJobCreateRequest:
      type: object
      properties:
        analysisType:
          type: string
        forceRebuildEvidenceBundle:
          type: boolean
          default: false
        reason:
          type: string
          nullable: true
      required:
      - analysisType
    Report:
      type: object
      properties:
        id:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        analysisJobId:
          type: string
          format: uuid
          nullable: true
        format:
          type: string
          enum:
          - PDF
          - MARKDOWN
          - LINK
        status:
          type: string
        downloadUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - runId
      - format
      - status
      - createdAt
    ReportCreateRequest:
      type: object
      properties:
        format:
          type: string
          enum:
          - PDF
          - MARKDOWN
          - LINK
        analysisJobId:
          type: string
          format: uuid
          nullable: true
      required:
      - format
    LiveRun:
      type: object
      properties:
        runId:
          type: string
          format: uuid
        status:
          type: string
        currentStepOrder:
          type: integer
          nullable: true
        currentAction:
          type: string
          nullable: true
        latestFrame:
          $ref: '#/components/schemas/LatestSnapshot'
      required:
      - runId
      - status
    RunnerAcceptedRequest:
      type: object
      properties:
        workerId:
          type: string
        acceptedAt:
          type: string
          format: date-time
        browserSessionId:
          type: string
          nullable: true
      required:
      - workerId
      - acceptedAt
    RunnerStepEvent:
      type: object
      properties:
        eventId:
          type: string
        stepOrder:
          type: integer
        stepId:
          type: string
          format: uuid
          nullable: true
        eventType:
          type: string
        occurredAt:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
      required:
      - eventId
      - stepOrder
      - eventType
      - occurredAt
      - payload
    RunnerStepEventsRequest:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/RunnerStepEvent'
      required:
      - events
    RunnerArtifactsRequest:
      type: object
      properties:
        artifacts:
          type: array
          items:
            type: object
            properties:
              artifactId:
                type: string
                format: uuid
              stepId:
                type: string
                format: uuid
                nullable: true
              artifactType:
                type: string
              bucket:
                type: string
              key:
                type: string
              mimeType:
                type: string
              width:
                type: integer
                nullable: true
              height:
                type: integer
                nullable: true
              sizeBytes:
                type: integer
              sha256:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
            required:
            - artifactId
            - artifactType
            - bucket
            - key
            - mimeType
            - sizeBytes
            - createdAt
      required:
      - artifacts
    RunnerFinishedRequest:
      type: object
      properties:
        workerId:
          type: string
        executionFinishedAt:
          type: string
          format: date-time
        summary:
          type: object
          properties:
            completedStepCount:
              type: integer
            failedStepCount:
              type: integer
            stopped:
              type: boolean
          required:
          - completedStepCount
          - failedStepCount
          - stopped
      required:
      - workerId
      - executionFinishedAt
      - summary
    RunnerFailedRequest:
      type: object
      properties:
        workerId:
          type: string
        failedAt:
          type: string
          format: date-time
        failureCode:
          type: string
        failureMessage:
          type: string
        resultCompleteness:
          type: string
          enum:
          - NONE
          - PARTIAL
          - FINAL
      required:
      - workerId
      - failedAt
      - failureCode
      - failureMessage
      - resultCompleteness
    AnalyzerCompletedRequest:
      type: object
      properties:
        analysisJobId:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        analyzerVersion:
          type: string
        promptVersion:
          type: string
          nullable: true
        modelInfo:
          type: object
          additionalProperties: true
        topFindings:
          type: array
          items:
            $ref: '#/components/schemas/AnalysisFinding'
        nudges:
          type: array
          items:
            $ref: '#/components/schemas/Nudge'
        completedAt:
          type: string
          format: date-time
      required:
      - analysisJobId
      - runId
      - analyzerVersion
      - modelInfo
      - topFindings
      - nudges
      - completedAt
    AnalyzerFailedRequest:
      type: object
      properties:
        analysisJobId:
          type: string
          format: uuid
        runId:
          type: string
          format: uuid
        failedAt:
          type: string
          format: date-time
        errorCode:
          type: string
        errorMessage:
          type: string
      required:
      - analysisJobId
      - runId
      - failedAt
      - errorCode
      - errorMessage
    ListProjectResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - data
      - meta
    ListScenarioTemplateResponse:
      type: object
      properties:
        data:
