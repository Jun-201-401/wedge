openapi: 3.0.3
info:
  title: Wedge API
  version: 1.0.0-draft
  description: Wedge public REST API (/api), internal callback API (/internal), and canonical transport schemas. This draft includes
    report shares, checkpoint callback, and evidence packet retrieval.
servers:
- url: https://api.wedge.example.com
  description: production placeholder
- url: https://staging-api.wedge.example.com
  description: staging placeholder
security:
- oauth2: []
tags:
- name: Auth
- name: Projects
- name: ScenarioTemplates
- name: Discoveries
- name: Runs
- name: Steps
- name: Events
- name: Artifacts
- name: Signals
- name: Analysis
- name: Reports
- name: InternalRunner
- name: InternalAnalyzer
paths:
  /api/auth/signup:
    post:
      tags:
      - Auth
      operationId: signup
      summary: Sign up a human web user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Signed up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/login:
    post:
      tags:
      - Auth
      operationId: login
      summary: Log in a human web user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/refresh:
    post:
      tags:
      - Auth
      operationId: refreshHumanToken
      summary: Rotate refresh token and issue new tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAuthTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/auth/logout:
    post:
      tags:
      - Auth
      operationId: logout
      summary: Log out current human web user
      security:
      - HumanBearer: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/auth/me:
    get:
      tags:
      - Auth
      operationId: getCurrentUser
      summary: Get current human web user
      security:
      - HumanBearer: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/projects:
    get:
      tags:
      - Projects
      operationId: listProjects
      summary: List projects
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: workspaceId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Projects
      operationId: createProject
      summary: Create project
      security:
      - oauth2:
        - wedge.execute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/projects/{projectId}:
    get:
      tags:
      - Projects
      operationId: getProject
      summary: Get project
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - Projects
      operationId: patchProject
      summary: Patch project
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatchRequest'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates:
    get:
      tags:
      - ScenarioTemplates
      operationId: listScenarioTemplates
      summary: List scenario templates
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: status
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Scenario template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListScenarioTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplate
      summary: Get scenario template
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Scenario template
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplate'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}/versions/{versionId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplateVersion
      summary: Get scenario template version
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Scenario template version
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplateVersion'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/discoveries:
    post:
      tags:
      - Discoveries
      operationId: createDiscovery
      summary: Start lightweight Site Discovery / Preflight
      description: Performs a short URL-first discovery pass to recommend applicable scenarios before creating a full run.
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDiscoveryRequest'
            example:
              url: https://example.com
              devicePreset: desktop
              viewport:
                width: 1440
                height: 900
      responses:
        '202':
          description: Discovery queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleDiscoveryResponse'
              example:
                data:
                  discoveryId: disc_123
                  status: QUEUED
                meta:
                  requestId: req_123
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/discoveries/{discoveryId}:
    get:
      tags:
      - Discoveries
      operationId: getDiscovery
      summary: Get Site Discovery / Preflight result
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/DiscoveryId'
      responses:
        '200':
          description: Discovery result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleDiscoveryResponse'
              example:
                data:
                  discoveryId: disc_123
                  status: COMPLETED
                  inputUrl: https://example.com
                  finalUrl: https://example.com
                  summary:
                    detectedFlowTypes:
                    - LANDING_CTA
                    - SIGNUP_LEAD_FORM
                    missingFlowTypes:
                    - PURCHASE_CHECKOUT
                    primaryCtaCount: 2
                    formCandidateCount: 1
                    pricingEntrypointCount: 0
                    checkoutEntrypointCount: 0
                  scenarioRecommendations:
                  - scenarioType: LANDING_CTA
                    recommendationLevel: HIGH
                    confidence: 0.86
                    reason: First-view primary CTA supports a landing CTA scenario.
                    evidenceRefs:
                    - cp_001.obs_002
                    suggestedStartUrl: https://example.com
                  - scenarioType: PURCHASE_CHECKOUT
                    recommendationLevel: LOW
                    confidence: 0.22
                    reason: No pricing, cart, or checkout entrypoint was detected.
                    evidenceRefs:
                    - cp_001.obs_008
                meta:
                  requestId: req_124
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs:
    get:
      tags:
      - Runs
      operationId: listRuns
      summary: List runs
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: projectId
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
      - name: analysisStatus
        in: query
        schema:
          type: string
      - name: createdFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: createdTo
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Runs
      operationId: createRun
      summary: Create run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}:
    get:
      tags:
      - Runs
      operationId: getRun
      summary: Get run
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Runs
      operationId: deleteRun
      summary: Delete run
      security:
      - oauth2:
        - wedge.admin
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '204':
          description: Run deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/start:
    post:
      tags:
      - Runs
      operationId: startRun
      summary: Start run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      responses:
        '202':
          description: Run start accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/stop:
    post:
      tags:
      - Runs
      operationId: stopRun
      summary: Stop run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunActionRequest'
      responses:
        '202':
          description: Run stop accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/live:
    get:
      tags:
      - Runs
      operationId: getRunLive
      summary: Get live run state
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Live run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLiveRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/steps:
    get:
      tags:
      - Steps
      operationId: listRunSteps
      summary: List run steps
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Run steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStepResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/steps/{stepId}:
    get:
      tags:
      - Steps
      operationId: getRunStep
      summary: Get run step
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Run step detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleStepResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/events:
    get:
      tags:
      - Events
      operationId: listRunEvents
      summary: List run events
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      - name: eventType
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Run events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunEventResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/artifacts:
    get:
      tags:
      - Artifacts
      operationId: listRunArtifacts
      summary: List run artifacts
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: type
        in: query
        schema:
          type: string
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Run artifacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListArtifactResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/signals:
    get:
      tags:
      - Signals
      operationId: listRunSignals
      summary: List run issue signals
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      - name: category
        in: query
        schema:
          type: string
      - name: source
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Run issue signals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSignalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/analysis-jobs:
    get:
      tags:
      - Analysis
      operationId: listRunAnalysisJobs
      summary: List analysis jobs for run
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Analysis jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAnalysisJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Analysis
      operationId: createAnalysisJob
      summary: Create analysis job
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisJobCreateRequest'
      responses:
        '202':
          description: Analysis job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
