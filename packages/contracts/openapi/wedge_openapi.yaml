components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://auth.wedge.example.com/oauth2/authorize
          tokenUrl: https://auth.wedge.example.com/oauth2/token
          scopes:
            wedge.read: Read Wedge resources
            wedge.execute: Create and execute runs
            wedge.export: Export reports
            wedge.admin: Administrative actions
        clientCredentials:
          tokenUrl: https://auth.wedge.example.com/oauth2/token
          scopes:
            wedge.read: Read Wedge resources
            wedge.execute: Create and execute runs
            wedge.export: Export reports
            wedge.admin: Administrative actions
    InternalBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
    HumanBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DiscoveryId:
      name: discoveryId
      in: path
      required: true
      schema:
        type: string
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StepId:
      name: stepId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AnalysisJobId:
      name: analysisJobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportId:
      name: reportId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  headers:
    XCorrelationId:
      schema:
        type: string
    IdempotencyKey:
      schema:
        type: string
    XWorkerId:
      schema:
        type: string
    XEventId:
      schema:
        type: string
    XSignature:
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AcceptedAck:
      description: Accepted for asynchronous processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
  schemas:
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 100
        displayName:
          type: string
          minLength: 2
          maxLength: 120
      required:
      - email
      - password
      - displayName
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
      - refreshToken
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - INACTIVE
      required:
      - id
      - email
      - displayName
      - status
    AuthToken:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/User'
      required:
      - accessToken
      - refreshToken
      - tokenType
      - expiresIn
      - user
    SingleAuthTokenResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/AuthToken'
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - data
      - meta
    SingleUserResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - data
      - meta
    Meta:
      type: object
      properties:
        requestId:
          type: string
        correlationId:
          type: string
          nullable: true
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
          nullable: true
      required:
      - requestId
    ErrorCode:
      type: string
      enum:
      - UNAUTHORIZED
      - FORBIDDEN
      - NOT_FOUND
      - CONFLICT
      - VALIDATION_ERROR
      - DISCOVERY_NOT_FOUND
      - DISCOVERY_EXPIRED
      - DISCOVERY_FAILED
      - SCENARIO_NOT_APPLICABLE
      - SCENARIO_FIT_LOW_CONFIDENCE
      - NO_ENTRYPOINT_FOUND
      - UNSAFE_SCENARIO_ACTION
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            details:
              type: object
              additionalProperties: true
          required:
          - code
          - message
        meta:
          $ref: '#/components/schemas/Meta'
      required:
      - error
      - meta
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          example: project
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        baseUrl:
          type: string
          format: uri
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - type
      - workspaceId
      - name
      - baseUrl
      - status
      - createdAt
    ProjectCreateRequest:
      type: object
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        baseUrl:
          type: string
          format: uri
      required:
      - workspaceId
      - name
      - baseUrl
    ProjectPatchRequest:
      type: object
      properties:
        name:
          type: string
        baseUrl:
          type: string
          format: uri
        status:
          type: string
    ScenarioTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateKey:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
      required:
      - id
      - templateKey
      - name
      - status
    ScenarioTemplateVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        versionNo:
          type: integer
        definition:
          type: object
          additionalProperties: true
      required:
      - id
      - templateId
      - versionNo
      - definition
    ScenarioType:
      type: string
      enum:
      - LANDING_CTA
      - SIGNUP_LEAD_FORM
      - PRICING
      - PURCHASE_CHECKOUT
      - CONTACT
      - CONTENT_ONLY
    ScenarioRecommendationLevel:
      type: string
      enum:
      - HIGH
      - MEDIUM
      - LOW
      - NOT_AVAILABLE
    DiscoveryStatus:
      type: string
      enum:
      - QUEUED
      - RUNNING
      - COMPLETED
      - FAILED
      - EXPIRED
    ScenarioFitStatus:
      type: string
      enum:
      - UNKNOWN
      - APPLICABLE
      - LOW_CONFIDENCE
      - NOT_APPLICABLE
      - BLOCKED_BY_SITE
      - UNSAFE_OR_RESTRICTED
    DiscoveryViewport:
      type: object
      properties:
        width:
          type: integer
          minimum: 320
        height:
          type: integer
          minimum: 480
      required:
      - width
      - height
    CreateDiscoveryRequest:
      type: object
      properties:
        projectId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        devicePreset:
          type: string
          enum:
          - desktop
          - tablet
          - mobile
          default: desktop
        viewport:
          $ref: '#/components/schemas/DiscoveryViewport'
      required:
      - projectId
      - url
      - devicePreset
    DiscoverySummary:
      type: object
      properties:
        detectedFlowTypes:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioType'
        missingFlowTypes:
          type: array
          items:
            $ref: '#/components/schemas/ScenarioType'
        primaryCtaCount:
          type: integer
          minimum: 0
        formCandidateCount:
