openapi: 3.0.3
info:
  title: Wedge API
  version: 1.0.0-draft
  description: Wedge public REST API (/api), internal callback API (/internal), and core resource
    schemas.
servers:
- url: https://api.wedge.example.com
  description: production placeholder
- url: https://staging-api.wedge.example.com
  description: staging placeholder
security:
- oauth2: []
tags:
- name: Projects
- name: ScenarioTemplates
- name: Runs
- name: Steps
- name: Events
- name: Artifacts
- name: Signals
- name: Analysis
- name: Reports
- name: InternalRunner
- name: InternalAnalyzer
paths:
  /api/projects:
    get:
      tags:
      - Projects
      operationId: listProjects
      summary: List projects
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: workspaceId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Projects
      operationId: createProject
      summary: Create project
      security:
      - oauth2:
        - wedge.execute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/projects/{projectId}:
    get:
      tags:
      - Projects
      operationId: getProject
      summary: Get project
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    patch:
      tags:
      - Projects
      operationId: patchProject
      summary: Patch project
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectPatchRequest'
      responses:
        '200':
          description: Project detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleProjectResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates:
    get:
      tags:
      - ScenarioTemplates
      operationId: listScenarioTemplates
      summary: List scenario templates
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: status
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Scenario template list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListScenarioTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplate
      summary: Get scenario template
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Scenario template
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplate'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/scenario-templates/{templateId}/versions/{versionId}:
    get:
      tags:
      - ScenarioTemplates
      operationId: getScenarioTemplateVersion
      summary: Get scenario template version
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/TemplateId'
      - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Scenario template version
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScenarioTemplateVersion'
                  meta:
                    $ref: '#/components/schemas/Meta'
                required:
                - data
                - meta
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs:
    get:
      tags:
      - Runs
      operationId: listRuns
      summary: List runs
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: projectId
        in: query
        schema:
          type: string
          format: uuid
      - name: status
        in: query
        schema:
          type: string
      - name: analysisStatus
        in: query
        schema:
          type: string
      - name: createdFrom
        in: query
        schema:
          type: string
          format: date-time
      - name: createdTo
        in: query
        schema:
          type: string
          format: date-time
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Runs
      operationId: createRun
      summary: Create run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunCreateRequest'
      responses:
        '201':
          description: Run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}:
    get:
      tags:
      - Runs
      operationId: getRun
      summary: Get run
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - Runs
      operationId: deleteRun
      summary: Delete run
      security:
      - oauth2:
        - wedge.admin
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '204':
          description: Run deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/start:
    post:
      tags:
      - Runs
      operationId: startRun
      summary: Start run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      responses:
        '202':
          description: Run start accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/stop:
    post:
      tags:
      - Runs
      operationId: stopRun
      summary: Stop run
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunActionRequest'
      responses:
        '202':
          description: Run stop accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/live:
    get:
      tags:
      - Runs
      operationId: getRunLive
      summary: Get live run state
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Live run state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleLiveRunResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/steps:
    get:
      tags:
      - Steps
      operationId: listRunSteps
      summary: List run steps
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Run steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStepResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/steps/{stepId}:
    get:
      tags:
      - Steps
      operationId: getRunStep
      summary: Get run step
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/StepId'
      responses:
        '200':
          description: Run step detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleStepResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/events:
    get:
      tags:
      - Events
      operationId: listRunEvents
      summary: List run events
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      - name: eventType
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Run events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRunEventResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/artifacts:
    get:
      tags:
      - Artifacts
      operationId: listRunArtifacts
      summary: List run artifacts
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: type
        in: query
        schema:
          type: string
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Run artifacts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListArtifactResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/signals:
    get:
      tags:
      - Signals
      operationId: listRunSignals
      summary: List run issue signals
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: stepId
        in: query
        schema:
          type: string
          format: uuid
      - name: category
        in: query
        schema:
          type: string
      - name: source
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Run issue signals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSignalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/analysis-jobs:
    get:
      tags:
      - Analysis
      operationId: listRunAnalysisJobs
      summary: List analysis jobs for run
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Analysis jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAnalysisJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Analysis
      operationId: createAnalysisJob
      summary: Create analysis job
      security:
      - oauth2:
        - wedge.execute
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalysisJobCreateRequest'
      responses:
        '202':
          description: Analysis job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/analysis-jobs/{analysisJobId}:
    get:
      tags:
      - Analysis
      operationId: getAnalysisJob
      summary: Get analysis job
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/AnalysisJobId'
      responses:
        '200':
          description: Analysis job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleAnalysisJobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/runs/{runId}/reports:
    get:
      tags:
      - Reports
      operationId: listRunReports
      summary: List reports for run
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/RunId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Reports
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags:
      - Reports
      operationId: createReport
      summary: Create report export job
      security:
      - oauth2:
        - wedge.export
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
      responses:
        '202':
          description: Report export accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/reports/{reportId}:
    get:
      tags:
      - Reports
      operationId: getReport
      summary: Get report
      security:
      - oauth2:
        - wedge.read
      parameters:
      - $ref: '#/components/parameters/ReportId'
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleReportResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /internal/runner/runs/{runId}/accepted:
    post:
      tags:
      - InternalRunner
      operationId: runnerAccepted
      summary: Runner accepted run
      security:
      - InternalBearer: []
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: X-Worker-Id
        in: header
        required: false
        schema:
          type: string
      - name: X-Event-Id
        in: header
        required: true
        schema:
          type: string
      - name: X-Signature
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunnerAcceptedRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /internal/runner/runs/{runId}/step-events:
    post:
      tags:
      - InternalRunner
      operationId: runnerStepEvents
      summary: Runner pushed step events
      security:
      - InternalBearer: []
      parameters:
      - $ref: '#/components/parameters/RunId'
      - name: X-Worker-Id
        in: header
        required: false
        schema:
          type: string
      - name: X-Event-Id
        in: header
        required: true
        schema:
          type: string
      - name: X-Signature
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunnerStepEventsRequest'
      responses:
        '200':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
