                  - issue_id: issue_003
                    criterion_id: VALUE-LIST-001
                    stage: VALUE
                    axis: Path
                    severity: 1
                    confidence: 0.74
                    priority_score: 1.51
                    evidence_refs:
                      - cp_003.obs_006
                    summary: 혜택 목록 확장 후 항목 수가 급격히 늘어나 사용자의 읽기 부담이 커질 수 있습니다.
                    recommendations:
