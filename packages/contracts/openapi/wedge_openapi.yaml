                expectedEffect: 핵심 가치 인지 시간을 줄여 다음 CTA 이동을 더 빠르게 만든다.
                priority: P2
                followUpQuestion: 확장 후 사용자는 가장 중요한 혜택을 빠르게 식별하는가?
              - title: validation timeout fallback을 명확히 제공
                rationale: settle_response timeout evidence가 존재하면 사용자는 검증 완료 여부를 신뢰하기 어렵다.
                difficulty: MEDIUM
                expectedEffect: timeout 상황에서도 사용자가 재시도나 다음 진행을 이해하고 선택할 수 있다.
                priority: P1
                followUpQuestion: validation timeout이 발생해도 사용자는 다음 행동을 이해할 수 있는가?
              judgeResult:
                schema_version: '0.5'
                run_id: run_001
                evidence_schema_version: '0.5'
                rule_registry_id: registry_p0_001
                summary:
                  overall_risk: medium
                  friction_score: 61
                  top_issues_count: 3
                  task_success: partial
