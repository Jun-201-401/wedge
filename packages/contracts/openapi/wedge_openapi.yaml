        default: 20
  headers:
    XCorrelationId:
      schema:
        type: string
    IdempotencyKey:
      schema:
        type: string
    XWorkerId:
      schema:
        type: string
    XEventId:
      schema:
        type: string
    XSignature:
      schema:
        type: string
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AcceptedAck:
      description: Accepted for asynchronous processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AckResponse'
  schemas:
    DecisionStage:
      type: string
      description: Operational decision moment label assigned by ScenarioPlan, Checkpoint, Observation, and Rule Engine. LLM does not infer or mutate it in V1.
      enum:
      - FIRST_VIEW
      - VALUE
      - CTA
      - INPUT
      - COMMIT
    StageStatus:
      type: string
      description: Decision Map status for a stage. This is distinct from run lifecycle and scenarioFitStatus.
      enum:
      - OBSERVED
      - PASS
      - WARNING
      - BLOCKED
      - NOT_OBSERVED
      - NOT_APPLICABLE
    DecisionMapItem:
      type: object
      properties:
        stage:
          $ref: '#/components/schemas/DecisionStage'
        displayName:
          type: string
          example: 행동 선택
        status:
          $ref: '#/components/schemas/StageStatus'
        issueIds:
          type: array
          items:
            type: string
        summary:
          type: string
          nullable: true
        evidenceRefs:
          type: array
          items:
            type: string
      required:
      - stage
      - displayName
      - status
      - issueIds
      - evidenceRefs
    JudgeIssue:
      type: object
      description: User-facing Judge issue produced by Rule Engine. Stage is assigned from StageContext; LLM cannot create or move it.
      properties:
        issueId:
          type: string
        criterionId:
          type: string
        stage:
          $ref: '#/components/schemas/DecisionStage'
        axis:
          type: string
        severity:
          type: integer
          minimum: 0
          maximum: 3
        confidence:
          type: number
          minimum: 0
          maximum: 1
        priorityScore:
          type: number
        evidenceRefs:
          type: array
          items:
            type: string
        summary:
          type: string
        recommendations:
          type: array
          items:
            type: string
      required:
      - issueId
      - criterionId
      - stage
      - axis
      - severity
      - confidence
      - priorityScore
      - evidenceRefs
      - summary
      - recommendations
