              - rank: 3
                category: INPUT_TIMEOUT
                title: 이메일 validation response timeout 발생
                description: 입력 검증 response가 timeout으로 끝나 사용자가 다음 진행 가능 여부를 신뢰하기 어려울 수 있다.
