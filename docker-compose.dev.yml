name: wedge-dev

services:
  postgres:
    image: postgres:17
    container_name: wedge-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    container_name: wedge-redis-dev
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    container_name: wedge-rabbitmq-dev
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/rabbitmq-definitions-dev.json:/etc/rabbitmq/rabbitmq-definitions-dev.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wedge-minio-dev
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: wedge-minio-init-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/wedge-artifacts;
      exit 0;
      "

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    container_name: wedge-runner-dev
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["npm", "run", "start", "--", "--consume-mq"]
    environment:
      RUNNER_SERVICE_NAME: runner
      RUNNER_MQ_CONSUMER_ENABLED: "true"
      RUNNER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      RUNNER_MQ_QUEUE_RUN_EXECUTE: run.execute.request
      RUNNER_MQ_PREFETCH: 1
      RUNNER_MQ_REQUEUE_ON_FAILURE: "false"
      RUNNER_BROWSER_MODE: playwright
      RUNNER_BROWSER_HEADLESS: "true"
    shm_size: 1gb
    init: true
    restart: unless-stopped
    volumes:
      - ./apps/runner/.runner-artifacts:/app/apps/runner/.runner-artifacts

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
