name: wedge-dev

services:
  postgres:
    image: postgres:16
    container_name: wedge-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wedge}
      POSTGRES_DB: ${POSTGRES_DB:-wedge}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
