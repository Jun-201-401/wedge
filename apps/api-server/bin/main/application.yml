spring:
  application:
    name: wedge-api-server
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wedge}
    username: ${SPRING_DATASOURCE_USERNAME:wedge}
    password: ${SPRING_DATASOURCE_PASSWORD:wedge}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-handlers-package: com.wedge.common.mybatis
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

wedge:
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:}
    runner-callback-signature-secret: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET:${RUNNER_CALLBACK_SIGNATURE_SECRET:}}
