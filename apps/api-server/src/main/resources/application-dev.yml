spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

wedge:
  runner:
    mq:
      exchange: ${WEDGE_RUNNER_MQ_EXCHANGE}
      run-execute-queue: ${WEDGE_RUN_EXECUTE_QUEUE}
      agent-execute-queue: ${WEDGE_AGENT_EXECUTE_QUEUE:agent.execute.request}
      discovery-execute-queue: ${WEDGE_DISCOVERY_EXECUTE_QUEUE:discovery.execute.request}
      scenario-authoring-execute-queue: ${WEDGE_SCENARIO_AUTHORING_EXECUTE_QUEUE:scenario-authoring.execute.request}
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}
    runner-callback-signature-secret: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET:${RUNNER_CALLBACK_SIGNATURE_SECRET:}}

  auth:
    refresh-cookie:
      secure: ${WEDGE_REFRESH_COOKIE_SECURE:false}
  report:
    share-default-expiration-minutes: ${WEDGE_REPORT_SHARE_DEFAULT_EXPIRATION_MINUTES:10}
    public-base-url: ${WEDGE_PUBLIC_BASE_URL:http://localhost:8080}
    project-access-check-enabled: ${WEDGE_REPORT_PROJECT_ACCESS_CHECK_ENABLED:false}
  analysis:
    project-access-check-enabled: ${WEDGE_ANALYSIS_PROJECT_ACCESS_CHECK_ENABLED:false}
