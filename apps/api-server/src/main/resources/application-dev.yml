spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: 5672
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

wedge:
  runner:
    mq:
      exchange: ${WEDGE_RUNNER_MQ_EXCHANGE}
      run-execute-queue: ${WEDGE_RUN_EXECUTE_QUEUE}
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN}

  auth:
    refresh-cookie:
      secure: ${WEDGE_REFRESH_COOKIE_SECURE:false}
  report:
    project-access-check-enabled: ${WEDGE_REPORT_PROJECT_ACCESS_CHECK_ENABLED:false}
