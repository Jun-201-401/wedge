spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wedge_dev}
    username: ${SPRING_DATASOURCE_USERNAME:ssafy}
    password: ${SPRING_DATASOURCE_PASSWORD:ssafy}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

jwt:
  secret: ${JWT_SECRET:wedge-local-dev-jwt-secret-change-me-32-characters-minimum}

wedge:
  runner:
    mq:
      run-execute-queue: ${WEDGE_RUN_EXECUTE_QUEUE:run.execute.request}
  internal:
    service-token: ${INTERNAL_SERVICE_TOKEN:wedge-local-dev-internal-service-token}
