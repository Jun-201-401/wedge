spring:
  application:
    name: wedge-api-server
  ai:
    mcp:
      server:
        enabled: ${WEDGE_MCP_SERVER_ENABLED:false}
        name: wedge-mcp-server
        version: 0.1.0
        type: SYNC
        protocol: STREAMABLE
        instructions: "Read-only MCP adapter for Wedge run, evidence, and report data."
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        annotation-scanner:
          enabled: ${WEDGE_MCP_SERVER_ENABLED:false}

aws:
  region: ${AWS_REGION:ap-northeast-2}

wedge:
  artifacts:
    storage: ${WEDGE_ARTIFACT_STORAGE:filesystem}
    bucket: ${WEDGE_ARTIFACT_BUCKET:}
    local-root: ${WEDGE_ARTIFACT_LOCAL_ROOT:../runner/.runner-artifacts}
    s3:
      endpoint: ${WEDGE_ARTIFACT_S3_ENDPOINT:}
      region: ${WEDGE_ARTIFACT_S3_REGION:${AWS_REGION:ap-northeast-2}}
      access-key-id: ${WEDGE_ARTIFACT_S3_ACCESS_KEY_ID:}
      secret-access-key: ${WEDGE_ARTIFACT_S3_SECRET_ACCESS_KEY:}
      force-path-style: ${WEDGE_ARTIFACT_S3_FORCE_PATH_STYLE:false}
    presigned-url:
      max-count: ${WEDGE_ARTIFACT_PRESIGNED_URL_MAX_COUNT:20}
      ttl-seconds: ${WEDGE_ARTIFACT_PRESIGNED_URL_TTL_SECONDS:3600}
  auth:
    refresh-cookie:
      secure: ${WEDGE_REFRESH_COOKIE_SECURE:true}
  internal:
    runner-callback-signature-secret: ${INTERNAL_RUNNER_CALLBACK_SIGNATURE_SECRET:${RUNNER_CALLBACK_SIGNATURE_SECRET:}}
  report:
    share-default-expiration-minutes: ${WEDGE_REPORT_SHARE_DEFAULT_EXPIRATION_MINUTES:10}
    public-base-url: ${WEDGE_PUBLIC_BASE_URL:http://localhost:8080}
    project-access-check-enabled: ${WEDGE_REPORT_PROJECT_ACCESS_CHECK_ENABLED:true}
  analysis:
    project-access-check-enabled: ${WEDGE_ANALYSIS_PROJECT_ACCESS_CHECK_ENABLED:true}
  mcp:
    service-token: ${WEDGE_MCP_SERVICE_TOKEN:}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-handlers-package: com.wedge.common.mybatis
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi/wedge_openapi.yaml
    disable-swagger-default-url: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

jwt:
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
