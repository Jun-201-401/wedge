services:
  runner:
    environment:
      RUNNER_METRICS_ENABLED: "false"
      RUNNER_MESSAGE_IDEMPOTENCY_STORE_MODE: ${RUNNER_MESSAGE_IDEMPOTENCY_STORE_MODE:-api}
      RUNNER_AGENT_IDEMPOTENCY_STORE_MODE: ${RUNNER_AGENT_IDEMPOTENCY_STORE_MODE:-api}
      RUNNER_AGENT_IDEMPOTENCY_LEASE_TTL_MS: ${RUNNER_AGENT_IDEMPOTENCY_LEASE_TTL_MS:-300000}
      RUNNER_AGENT_IDEMPOTENCY_RENEW_INTERVAL_MS: ${RUNNER_AGENT_IDEMPOTENCY_RENEW_INTERVAL_MS:-60000}
    ports: !reset []
