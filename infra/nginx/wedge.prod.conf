map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream wedge_api {
    server api-server:8080;
}

upstream wedge_web {
    server web:80;
}

server {
    listen 80;
    server_name wedge-app.duckdns.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://wedge-app.duckdns.org$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wedge-app.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/wedge-app.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wedge-app.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location = /api {
        proxy_pass http://wedge_api;
    }

    location ^~ /api/ {
        proxy_pass http://wedge_api;
    }

    location ^~ /actuator/ {
        proxy_pass http://wedge_api;
    }

    location / {
        proxy_pass http://wedge_web;
    }
}
