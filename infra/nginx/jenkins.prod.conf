upstream wedge_jenkins {
    server jenkins:8080;
}

server {
    listen 80;
    server_name wedge-jenkins.duckdns.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://wedge-jenkins.duckdns.org$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wedge-jenkins.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/wedge-jenkins.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wedge-jenkins.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_redirect off;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location / {
        proxy_pass http://wedge_jenkins;
    }
}
