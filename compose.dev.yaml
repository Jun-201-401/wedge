name: wedge-dev

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "127.0.0.1:${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/rabbitmq-definitions-dev.json:/etc/rabbitmq/rabbitmq-definitions-dev.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      until mc ready local; do sleep 1; done;
      mc mb --ignore-existing local/wedge-artifacts;
      exit 0;
      "

  api-server:
    profiles:
      - api
    build:
      context: apps/api-server
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      WEDGE_RUNNER_MQ_EXCHANGE: ${WEDGE_RUNNER_MQ_EXCHANGE}
      WEDGE_RUN_EXECUTE_QUEUE: ${WEDGE_RUN_EXECUTE_QUEUE}
      WEDGE_DISCOVERY_EXECUTE_QUEUE: ${WEDGE_DISCOVERY_EXECUTE_QUEUE:-discovery.execute.request}
      WEDGE_ARTIFACT_STORAGE: ${WEDGE_ARTIFACT_STORAGE:-filesystem}
      WEDGE_ARTIFACT_BUCKET: ${WEDGE_ARTIFACT_BUCKET:-local-runner}
      WEDGE_ARTIFACT_LOCAL_ROOT: /app/apps/runner/.runner-artifacts
      WEDGE_ARTIFACT_S3_ENDPOINT: ${WEDGE_ARTIFACT_S3_ENDPOINT:-http://minio:9000}
      WEDGE_ARTIFACT_S3_REGION: ${WEDGE_ARTIFACT_S3_REGION:-us-east-1}
      WEDGE_ARTIFACT_S3_ACCESS_KEY_ID: ${WEDGE_ARTIFACT_S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER}}
      WEDGE_ARTIFACT_S3_SECRET_ACCESS_KEY: ${WEDGE_ARTIFACT_S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      WEDGE_ARTIFACT_S3_FORCE_PATH_STYLE: ${WEDGE_ARTIFACT_S3_FORCE_PATH_STYLE:-true}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      WEDGE_REFRESH_COOKIE_SECURE: ${WEDGE_REFRESH_COOKIE_SECURE:-false}
      WEDGE_REPORT_PROJECT_ACCESS_CHECK_ENABLED: ${WEDGE_REPORT_PROJECT_ACCESS_CHECK_ENABLED:-false}
    ports:
      - "127.0.0.1:${API_SERVER_PORT:-8080}:8080"
    init: true
    restart: unless-stopped
    volumes:
      - ./apps/runner/.runner-artifacts:/app/apps/runner/.runner-artifacts

  runner:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["npm", "run", "start", "--", "--consume-mq"]
    environment:
      RUNNER_SERVICE_NAME: runner
      RUNNER_MQ_CONSUMER_ENABLED: "true"
      RUNNER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      RUNNER_MQ_QUEUE_RUN_EXECUTE: run.execute.request
      RUNNER_MQ_PREFETCH: 1
      RUNNER_MQ_REQUEUE_ON_FAILURE: "false"
      RUNNER_BROWSER_MODE: playwright
      RUNNER_BROWSER_HEADLESS: "true"
      RUNNER_CALLBACK_MODE: http
      RUNNER_CALLBACK_BASE_URL: ${RUNNER_CALLBACK_BASE_URL:-http://host.docker.internal:8080}
      RUNNER_CALLBACK_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      RUNNER_ARTIFACTS_ROOT: /app/apps/runner/.runner-artifacts
      RUNNER_ARTIFACT_STORAGE: ${RUNNER_ARTIFACT_STORAGE:-filesystem}
      RUNNER_ARTIFACT_BUCKET: ${RUNNER_ARTIFACT_BUCKET:-local-runner}
      RUNNER_ARTIFACT_S3_ENDPOINT: ${RUNNER_ARTIFACT_S3_ENDPOINT:-http://minio:9000}
      RUNNER_ARTIFACT_S3_REGION: ${RUNNER_ARTIFACT_S3_REGION:-us-east-1}
      RUNNER_ARTIFACT_S3_ACCESS_KEY_ID: ${RUNNER_ARTIFACT_S3_ACCESS_KEY_ID:-${MINIO_ROOT_USER}}
      RUNNER_ARTIFACT_S3_SECRET_ACCESS_KEY: ${RUNNER_ARTIFACT_S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD}}
      RUNNER_ARTIFACT_S3_FORCE_PATH_STYLE: ${RUNNER_ARTIFACT_S3_FORCE_PATH_STYLE:-true}
    shm_size: 1gb
    init: true
    restart: unless-stopped
    volumes:
      - ./apps/runner/.runner-artifacts:/app/apps/runner/.runner-artifacts

  analyzer-api:
    build:
      context: .
      dockerfile: apps/analyzer/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    init: true
    restart: unless-stopped

  analyzer-worker:
    build:
      context: .
      dockerfile: apps/analyzer/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: ["python", "scripts/consume_analysis_requests.py"]
    environment:
      ANALYZER_WORKER_ID: analyzer-worker-dev
      ANALYZER_MQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2F
      ANALYZER_MQ_QUEUE_ANALYSIS_REQUEST: analysis.request
      ANALYZER_MQ_PREFETCH: 1
      ANALYZER_MQ_REQUEUE_ON_FAILURE: "false"
      ANALYZER_MQ_QUEUE_DEAD_LETTER_EXCHANGE: wedge.dlq
      ANALYZER_MQ_QUEUE_DEAD_LETTER_ROUTING_KEY: analysis.dlq
      ANALYZER_MQ_QUEUE_TYPE: ""
      ANALYZER_CALLBACK_BASE_URL: ${ANALYZER_CALLBACK_BASE_URL:-http://host.docker.internal:8080}
      ANALYZER_CALLBACK_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ANALYZER_CALLBACK_SIGNATURE_SECRET: ${ANALYZER_CALLBACK_SIGNATURE_SECRET:-local-secret}
      ANALYZER_EVIDENCE_BASE_URL: ${ANALYZER_EVIDENCE_BASE_URL:-http://host.docker.internal:8080}
      ANALYZER_EVIDENCE_AUTH_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    init: true
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
